<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form page</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kameron:wght@400..700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <style>
            body{
                font-family: "Kameron", sans-serif;
            }
            button:hover{
                background-color: black;
                color: white;
            }
            form ul li{
                display:inline-block;
            }
            li:first-child:hover{
                background-color: black;
                color: white;
            }
            .mess::before{
                content:"\1F31F";
            }
        </style>
    </head>
    <body>
        <div style="width:500px; border: 1px solid black; padding: 10px; margin: 0 auto;">
            <h1 align="center">job Application Form</h1>
            <form action="" mehtod="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter Name" required><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter Email" required><br><hr>
                <label for="age">   Age  :  </label>
                <input type="number" id="age" name="age" required min="20" max="40"><br>
                <label for="phone">Phone:</label>
                <input type="number" id="phone" name="phone" placeholder="Enter Phone number" required><br><hr>
                <label for="gender">Gender: </label>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label><br><hr>
                <label for="country">Country:</label>
                <select id="country" name="country">
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Australia">Australia</option>
                    <option value="Canada">Canada</option>
                </select><br><hr>
                <label for="Skills">Skills:</label>
                <input type="checkbox" id="java" name="skills" value="java">
                <label for="java">Java</label>
                <input type="checkbox" id="python" name="skills" value="python">
                <label for="python">Python</label> 
                <input type="checkbox" id="c" name="skills" value="c">
                <label for="c">C</label><br><hr>
                <label for="hobby">Hobby:</label>
                <ul>
                    <li>Reading</li>
                    <li>Traveling</li>
                    <li>Cooking</li>
                    <li>Playing</li>
                    <li>Photography</li>
                    <li>Painting</li>
                    <li>Dancing</li>
                </ul>
                <label for="message" class="mess">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="65" maxlength="200"></textarea><br>
                <button type="submit" style="width: 500px;height: 40px;" align="center">Submit</button><br>
                <button type="reset" style="width: 500px;height:40px;" align="center">Reset</button>
            </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
