<!DOCTYPE html>
<html>
    <head>
        <title>Positive or not</title>
    </head>
    <body>
        <script>
            function positive(){
                let number = prompt("what is your number");
                let al = number > 0 ? " Positive number" : "Negative Number";
                alert(al);
            }
            positive();
        </script>
    </body>
</html>
