<!DOCTYPE html>
<html>
    <head>
        <title>Student Grade</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <style>
            .form-control{
                width:450px;
            }
        </style>
    </head>
    <body>
        <div class="container" style="width:500px; margin:0 auto; border:1px solid black;">
            <div class="row">
                <div class="col-md-8">
                    <section>
                        <h1 class="text-center">Student Grade Calculator</h1>
                    </section>
                    <section>
                        <form action="" method="post" class="col-md-5">
                            <div class="md-3">
                                <label for="name" class="form-label">Student Name</label>
                                <input type="text" class="form-control" id="stdname">
                            </div>
                            <div class="md-3">
                                <label for="name" class="form-label">Subject 1</label>
                                <input type="text" class="form-control" id="sub1">
                            </div>
                            <div class="md-3">
                                <label for="name" class="form-label">Subject 2</label>
                                <input type="text" class="form-control" id="sub2">
                            </div>
                            <div class="md-3">
                                <label for="name" class="form-label">Subject 3</label>
                                <input type="text" class="form-control" id="sub3">
                            </div>
                            <div class="md-3">
                                <label for="name" class="form-label">Subject 4</label>
                                <input type="text" class="form-control" id="sub4">
                            </div>
                            <div class="md-3">
                                <label for="name" class="form-label">Subject 5</label>
                                <input type="text" class="form-control" id="sub5">
                            </div>
                            <div class="md-3">
                                <label for="name" class="form-label">Subject 6</label>
                                <input type="text" class="form-control" id="sub6">
                            </div>
                            <button type="button" id="button" class="btn btn-primary" onclick="Calculate()">Calculate</button>
                        </form>
                        <div id="result">

                        </div>
                    </section>
                </div>
                <div class="col-md-2">
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script>
            function Calculate(){
                let studentName = document.getElementById("stdname").value;
                let marks = [
                    document.getElementById("sub1").value,
                    document.getElementById("sub2").value,
                    document.getElementById("sub3").value,
                    document.getElementById("sub4").value,
                    document.getElementById("sub5").value,
                    document.getElementById("sub6").value
                ]
                let sum = 0;
                let pass = true;
                let grade = "";
                let result = "";

                if(studentName ==""){
                    alert("Student name must not be empty");
                }
                for(let i of marks){
                    if(i >= 0 && i <= 100){
                        sum += Number(i);
                    }
                    else{
                        alert("marks must be in between 0 to 100");
                    }
                    if(i < 35){
                        pass = false;
                    }
                }
                let avg = sum/marks.length;
                switch(true){
                    case 1:
                        if(sum > 90){
                        grade = "A+"
                        }
                        break;
                    case 2:
                        if(avg > 80){
                            grade = "A";
                        }
                        break;
                    case 3:
                        if(avg > 70){
                            grade = "B+";
                        }
                        break;
                    case 4:
                        if(avg > 60){
                            grade = "B";
                        }
                        break;
                    case 5:
                        if(avg > 50){
                            grade = "C+";
                        }
                        break;
                    case 6:
                        if(avg > 40){
                            grade = "C";
                        }
                        break;
                    case 7:
                        if(avg > 35){
                            grade ="D";
                        }
                        break;
                    default:
                        grade = "F";
                        break;
                }
                result = pass ? "pass" : "Fail";
                document.getElementById("result").innerHTML=`
                <h3>Student Result</h3>
                <p><b>Name:</b>${studentName}</p>
                <p><b>Sum:</b>${sum}</p>
                <p><b>Avg:</b>${avg}</p>
                <p><b>Result:</b>${result}</p>`;
            }
        </script>
    </body>
</html>
