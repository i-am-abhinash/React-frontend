<!DOCTYPE html>
<html>
    <head>
        <title>odd or even</title>
    </head>
    <body>
        <script>
            function oddoreven(){
                let i = prompt("Whats your number");
                if(i%2 == 0){
                    alert("Its an Even Number");
                }
                else{
                    alert("its an odd number");
                }
            }
            oddoreven();
        </script>
    </body>
</html>
