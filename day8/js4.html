<!DOCTYPE html>
<html>
    <head>
        <title>multiples of 3</title>
    </head>
    <body>
        <script>
            function multiple(){
                let number = 16;
                if(number%3 == 0){
                    document.write("multiple of 3");
                }
                else{
                    document.write("not multiple by 3");
                }
            }
            multiple();
        </script>
    </body>
</html>
