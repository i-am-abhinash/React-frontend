<!DOCTYPE html>
<html>
    <head>
        <title>Ascending order</title>
    </head>
    <body> 
        <script>
            let i = prompt("I number is");
            let j = prompt("j number is");
            let k = i > j ?  : {i,j};
            for(let n in k){
                document.write(n);
            }
        </script>
    </body>
</html>
