<!DOCTYPE html>
<html>
    <head>
        <title>factor of 84</title>
    </head>
    <body>
        <script>
            function factor(){
                let a = 2;
                if(84%a == 0){
                    document.write("yes");
                }
                else{
                    document.write("no");
                }
            }
            factor();
        </script>
    </body>
</html>
