<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Document</title>
    </head>
    <body>
        <script>
            function calc(){
                let a = prompt("What is your number");
                if(a % 7 == 0){
                    document.write("Divisible by 7");
                }
                else{
                   document.write("Not divisible by 7");
                }
            }
            calc();
        </script>
    </body>
</html>
