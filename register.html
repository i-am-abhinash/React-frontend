<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <style>
            form{
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <div style="width:500px; border:1px solid black; margin: 0 auto">
            <h1 align="center">Register Page</h1>
            <form action="" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter Your name" required><br>
                <label for="Email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter Your Email Id" required><br>
                <label for="Age">Age:</label>
                <input type="Age" id="Age" name="Age" placeholder="Age" required min="18" max="50"><br>
                <label for="Phone">Name:</label>
                <input type="tel" id="Phone" name="name" placeholder="Enter Your Phone number" required><br>
                <label for="gender" style="display: inline-block;">Gender:</label>
                <label for="male">Male</label>
                <input type="radio" id="male" name="gender" value="male">
                <label for="female">Female</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="other">Other</label>
                <input type="radio" id="other" name="gender" value="other"><br>
                <label for="country">Country:</label>
                <select id="country">
                    <option value="india">India</option>
                    <option value="usa">USA</option>
                    <option value="uk">UK</option>
                    <option value="australia">Australia</option>
                    <option value="canada">Canada</option>
                </select><br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required><br>
                <label for="cpassword">Confirm Password:</label>
                <input type="password" id="cpassword" name="cpassword" placeholder="Confirm Password" required><br>
                <button type="submit" style="width: 450px;height: 40px;" align="center">Register</button>
            </form>
        </div>
    </body>
</html>
