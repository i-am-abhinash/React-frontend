<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width">
        <title>Grade calculator</title>
        <style>
            div label{
                display: block;
            }
        </style>
    </head>
    <body>
        <div style="width:500px; border: 1px solid black; margin: 0 auto;">
            <h1 align="center">Student Grade Calculator</h1>
            <form action="" method="post">
                <div>
                    <label for="name">Student Name</label>
                    <input type="name" id="name">
                </div>
                <div>
                    <label for="sub1">Stubject 1</label>
                    <input type="number" id="sub1">
                </div>
                <div>
                    <label for="sub2">Subject 2</label>
                    <input type="number" id="sub2">
                </div>
                <div>
                    <label for="sub3">Subject 3</label>
                    <input type="number" id="sub3">
                </div>
                <div>
                    <label for="sub4">Subject 4</label>
                    <input type="number" id="sub4">
                </div>
                <div>
                    <label for="sub5">Subject 5</label>
                    <input type="number" id="sub5">
                </div>
                <div>
                    <label for="sub6">Subject 6</label>
                    <input type="number" id="sub6">
                </div>
            </form>
        </div>
    </body>
</html>
